function cargarGaleria() {
    const contenedor = document.getElementById('galeria');
    productos.forEach(p => {
        const card = document.createElement('div');
        card.className = 'card';
        card.onclick = () => abrirDetalle(p);
        card.innerHTML = `
            <img src="${p.img}" alt="${p.titulo}" loading="lazy" onerror="this.src='https://placeholder.com...'">
            <div class="card-info">
                <span style="font-size:0.7rem; color:#aaa">REF: ${p.id}</span>
                <h3>${p.titulo}</h3>
                <span class="price">${p.precio}</span>
            </div>
        `;
        contenedor.appendChild(card);
    });
}

function abrirDetalle(p) {
    document.getElementById('modal-titulo').innerText = p.titulo;
    document.getElementById('modal-desc').innerText = p.desc;
    document.getElementById('modal-precio').innerText = p.precio;
    document.getElementById('modal-bg').style.backgroundImage = `url('${p.img}')`;
    let mensaje = encodeURIComponent(`Hola Gabi, siento una conexión con "${p.titulo}" (Ref: ${p.id}). ¿Está disponible para mí?`);
    document.getElementById('btn-whatsapp').href = `https://wa.me{whatsappTel}?text=${mensaje}`;
    document.getElementById('miModal').style.display = "block";
}

function cerrarDetalle() { document.getElementById('miModal').style.display = "none"; }
window.onclick = (e) => { if (e.target.id === 'miModal') cerrarDetalle(); }
cargarGaleria();
